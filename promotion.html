<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Section / Promotion — Haseeb School</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <div id="sidebar-mount"></div>
  <div class="main">
    <div id="topbar-mount"></div>
    <div class="page">

      <div class="card">
        <div class="card-head"><h3>Search Student</h3></div>
        <div class="form-grid" style="grid-template-columns:1fr auto;">
          <input type="text" id="searchInput" placeholder="Search by Student No, Name, or Class…" style="padding:12px 14px;border-radius:8px;border:1.5px solid var(--border);font-size:14px;">
          <button class="btn btn-primary" id="searchBtn">Search</button>
        </div>
        <div class="table-wrap" style="margin-top:16px;">
          <table>
            <thead><tr><th>Student No</th><th>Name</th><th>Class</th><th></th></tr></thead>
            <tbody id="resultsBody"><tr class="empty-row"><td colspan="4">Search to select a student.</td></tr></tbody>
          </table>
        </div>
      </div>

      <div class="card" id="promoCard" style="display:none;">
        <div class="card-head"><h3 id="promoTitle">Promote to Next Class</h3></div>
        <form id="promoForm">
          <div class="form-grid">
            <div class="field">
              <label>New Class</label>
              <select id="classSelect" required><option value="">Select class…</option></select>
            </div>
            <div class="field"><label>Change Section</label><input type="text" id="section" placeholder="e.g. B"></div>
            <div class="field"><label>Monthly Fee</label><input type="number" id="monthlyFee" min="0"></div>
            <div class="field"><label>Annual Fee</label><input type="number" id="annualFee" min="0"></div>
          </div>
          <p style="margin-top:10px;font-size:12.5px;">Leave fee fields as-is to keep the class default, or override for this student.</p>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="saveBtn">Save Changes to Database</button>
          </div>
        </form>
      </div>

    </div>
  </div>
</div>

<script type="module">
  import { requireAuth, showToast } from './js/auth-guard.js';
  import { renderShell } from './js/shell.js';
  import { searchStudents, updateStudent, getAllClasses } from './js/data.js';

  renderShell({ title: 'Change Section / Promotion', breadcrumb: 'Module 6 — Promote, change section, update fee structure' });
  await requireAuth();

  const resultsBody = document.getElementById('resultsBody');
  const promoCard = document.getElementById('promoCard');
  const classSelect = document.getElementById('classSelect');
  let classes = [];
  let selected = null;

  try {
    classes = await getAllClasses();
    classes.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = `${c.className}${c.section ? ' - ' + c.section : ''}`;
      classSelect.appendChild(opt);
    });
  } catch(e){ console.error(e); }

  classSelect.addEventListener('change', () => {
    const cls = classes.find(c => c.id === classSelect.value);
    if (cls){
      document.getElementById('monthlyFee').value = cls.monthlyFee || 0;
      document.getElementById('annualFee').value = cls.annualFee || 0;
    }
  });

  async function runSearch(){
    const term = document.getElementById('searchInput').value;
    resultsBody.innerHTML = '<tr class="empty-row"><td colspan="4">Searching…</td></tr>';
    const rows = await searchStudents(term);
    if (rows.length === 0){
      resultsBody.innerHTML = '<tr class="empty-row"><td colspan="4">No students found.</td></tr>';
      return;
    }
    resultsBody.innerHTML = rows.map(s => `
      <tr>
        <td>${s.studentNo || '—'}</td><td>${s.name || '—'}</td><td>${s.className || '—'} ${s.section || ''}</td>
        <td><button class="btn btn-outline btn-sm" data-select="${s.id}">Select</button></td>
      </tr>
    `).join('');
    resultsBody.querySelectorAll('[data-select]').forEach(btn => {
      btn.addEventListener('click', () => selectStudent(rows.find(r => r.id === btn.dataset.select)));
    });
  }

  function selectStudent(s){
    selected = s;
    promoCard.style.display = 'block';
    document.getElementById('promoTitle').textContent = `Promote / Update — ${s.name} (${s.studentNo})`;
    classSelect.value = s.classId || '';
    document.getElementById('section').value = s.section || '';
    document.getElementById('monthlyFee').value = s.monthlyFee || 0;
    document.getElementById('annualFee').value = s.annualFee || 0;
    promoCard.scrollIntoView({ behavior:'smooth' });
  }

  document.getElementById('promoForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!selected) return;
    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
    const cls = classes.find(c => c.id === classSelect.value);
    try {
      await updateStudent(selected.id, {
        classId: classSelect.value || null,
        className: cls ? cls.className : selected.className,
        section: document.getElementById('section').value.trim(),
        monthlyFee: Number(document.getElementById('monthlyFee').value || 0),
        annualFee: Number(document.getElementById('annualFee').value || 0)
      });
      showToast('Student promoted and changes saved.', 'success');
      promoCard.style.display = 'none';
      runSearch();
    } catch(err){
      console.error(err);
      showToast('Could not save changes. ' + err.message, 'error');
    } finally {
      saveBtn.disabled = false; saveBtn.textContent = 'Save Changes to Database';
    }
  });

  document.getElementById('searchBtn').addEventListener('click', runSearch);
  document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); });
  runSearch();
</script>
</body>
</html>
