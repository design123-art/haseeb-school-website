<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Defaulter List — Haseeb School</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <div id="sidebar-mount"></div>
  <div class="main">
    <div id="topbar-mount"></div>
    <div class="page">

      <div class="card">
        <div class="card-head">
          <h3>Defaulter List</h3>
          <span class="badge badge-danger" id="countBadge">…</span>
        </div>
        <p>Students with unpaid fees for the current period. Both this list and Fee Slip read live from the central database.</p>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Student No</th><th>Name</th><th>Class</th><th>Father</th><th>Amount Due</th><th></th></tr></thead>
            <tbody id="listBody"><tr class="empty-row"><td colspan="6">Loading…</td></tr></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<script type="module">
  import { requireAuth } from './js/auth-guard.js';
  import { renderShell } from './js/shell.js';
  import { getDefaulterList, formatCurrency } from './js/data.js';

  renderShell({ title: 'Defaulter List', breadcrumb: 'Students with unpaid fees this month' });
  await requireAuth();

  const listBody = document.getElementById('listBody');
  const countBadge = document.getElementById('countBadge');

  try {
    const defaulters = await getDefaulterList();
    countBadge.textContent = `${defaulters.length} pending`;
    listBody.innerHTML = defaulters.length
      ? defaulters.map(s => `
          <tr>
            <td>${s.studentNo || '—'}</td><td>${s.name || '—'}</td><td>${s.className || '—'} ${s.section || ''}</td>
            <td>${s.father || '—'}</td><td><span class="badge badge-danger">${formatCurrency(s.pendingAmount)}</span></td>
            <td><a class="btn btn-outline btn-sm" href="pay-fee.html">Collect →</a></td>
          </tr>
        `).join('')
      : '<tr class="empty-row"><td colspan="6">No defaulters right now — everyone is paid up. 🎉</td></tr>';
  } catch(e){
    console.error(e);
    listBody.innerHTML = '<tr class="empty-row"><td colspan="6">Error loading defaulter list.</td></tr>';
  }
</script>
</body>
</html>
