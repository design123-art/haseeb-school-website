<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pay Fee — Haseeb School</title>
<link rel="stylesheet" href="css/style.css">
<style>
  @media print {
    .no-print{ display:none !important; }
    .sidebar, .topbar{ display:none !important; }
    .page{ padding:0; }
    body{ background:#fff; }
  }
  #slip{ display:none; }
  #slip .slip-box{ border:2px solid var(--primary); border-radius:14px; padding:26px; max-width:480px; margin:0 auto; }
  #slip .slip-head{ text-align:center; border-bottom:2px dashed var(--border); padding-bottom:14px; margin-bottom:14px; }
  #slip .row{ display:flex; justify-content:space-between; padding:6px 0; font-size:14px; border-bottom:1px dashed var(--border); }
</style>
</head>
<body>
<div class="app-shell">
  <div id="sidebar-mount"></div>
  <div class="main">
    <div id="topbar-mount"></div>
    <div class="page">

      <div class="card no-print">
        <div class="card-head"><h3>Search Student</h3></div>
        <div class="form-grid" style="grid-template-columns:1fr auto;">
          <input type="text" id="searchInput" placeholder="Search by Student No, Name, or Class…" style="padding:12px 14px;border-radius:8px;border:1.5px solid var(--border);font-size:14px;">
          <button class="btn btn-primary" id="searchBtn">Search</button>
        </div>
        <div class="table-wrap" style="margin-top:16px;">
          <table>
            <thead><tr><th>Student No</th><th>Name</th><th>Class</th><th></th></tr></thead>
            <tbody id="resultsBody"><tr class="empty-row"><td colspan="4">Search to select a student.</td></tr></tbody>
          </table>
        </div>
      </div>

      <div class="card no-print" id="payCard" style="display:none;">
        <div class="card-head"><h3 id="payTitle">Receive Fee Payment</h3></div>
        <form id="payForm">
          <div class="form-grid">
            <div class="field">
              <label>Fee Type</label>
              <select id="feeType" required>
                <option value="monthly">Monthly</option>
                <option value="annual">Annual</option>
              </select>
            </div>
            <div class="field"><label>Period</label><input type="text" id="period" required></div>
            <div class="field"><label>Amount</label><input type="number" id="amount" min="0" required></div>
            <div class="field"><label>Concession (if required)</label><input type="number" id="concession" min="0" value="0"></div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="payBtn">Update Database &amp; Generate Slip</button>
          </div>
        </form>
      </div>

      <div id="slip" class="no-print-wrap">
        <div class="card no-print" style="margin-bottom:10px;display:flex;gap:10px;">
          <button class="btn btn-primary" onclick="window.print()">Print Fee Slip</button>
          <button class="btn btn-outline" id="newPaymentBtn">New Payment</button>
        </div>
        <div class="slip-box card">
          <div class="slip-head">
            <h2 style="margin-bottom:2px;">Haseeb School</h2>
            <p style="margin:0;">Official Fee Receipt</p>
          </div>
          <div class="row"><span>Student No</span><strong id="slipNo"></strong></div>
          <div class="row"><span>Name</span><strong id="slipName"></strong></div>
          <div class="row"><span>Class</span><strong id="slipClass"></strong></div>
          <div class="row"><span>Fee Type</span><strong id="slipType"></strong></div>
          <div class="row"><span>Period</span><strong id="slipPeriod"></strong></div>
          <div class="row"><span>Amount</span><strong id="slipAmount"></strong></div>
          <div class="row"><span>Concession</span><strong id="slipConcession"></strong></div>
          <div class="row" style="border-bottom:none;"><span>Date</span><strong id="slipDate"></strong></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script type="module">
  import { requireAuth, showToast } from './js/auth-guard.js';
  import { renderShell } from './js/shell.js';
  import { searchStudents, addFeePayment, formatCurrency, currentPeriod } from './js/data.js';

  renderShell({ title: 'Pay Fee', breadcrumb: 'Module 4 — Receive payment, apply concession, print slip' });
  await requireAuth();

  const resultsBody = document.getElementById('resultsBody');
  const payCard = document.getElementById('payCard');
  const slip = document.getElementById('slip');
  let selectedStudent = null;

  async function runSearch(){
    const term = document.getElementById('searchInput').value;
    resultsBody.innerHTML = '<tr class="empty-row"><td colspan="4">Searching…</td></tr>';
    const rows = await searchStudents(term);
    if (rows.length === 0){
      resultsBody.innerHTML = '<tr class="empty-row"><td colspan="4">No students found.</td></tr>';
      return;
    }
    resultsBody.innerHTML = rows.map(s => `
      <tr>
        <td>${s.studentNo || '—'}</td><td>${s.name || '—'}</td><td>${s.className || '—'} ${s.section || ''}</td>
        <td><button class="btn btn-outline btn-sm" data-select="${s.id}">Select</button></td>
      </tr>
    `).join('');
    resultsBody.querySelectorAll('[data-select]').forEach(btn => {
      btn.addEventListener('click', () => selectStudent(rows.find(r => r.id === btn.dataset.select)));
    });
  }

  function selectStudent(s){
    selectedStudent = s;
    payCard.style.display = 'block';
    slip.style.display = 'none';
    document.getElementById('payTitle').textContent = `Receive Fee Payment — ${s.name} (${s.studentNo})`;
    document.getElementById('period').value = currentPeriod();
    document.getElementById('amount').value = s.monthlyFee || '';
    payCard.scrollIntoView({ behavior: 'smooth' });
  }

  document.getElementById('feeType').addEventListener('change', (e) => {
    if (!selectedStudent) return;
    if (e.target.value === 'annual'){
      document.getElementById('amount').value = selectedStudent.annualFee || '';
      document.getElementById('period').value = new Date().getFullYear();
    } else {
      document.getElementById('amount').value = selectedStudent.monthlyFee || '';
      document.getElementById('period').value = currentPeriod();
    }
  });

  document.getElementById('payForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!selectedStudent) return;
    const payBtn = document.getElementById('payBtn');
    payBtn.disabled = true; payBtn.textContent = 'Saving…';

    const payload = {
      studentId: selectedStudent.id,
      studentNo: selectedStudent.studentNo,
      studentName: selectedStudent.name,
      className: selectedStudent.className,
      type: document.getElementById('feeType').value,
      period: document.getElementById('period').value.trim(),
      amount: Number(document.getElementById('amount').value || 0),
      concession: Number(document.getElementById('concession').value || 0)
    };

    try {
      await addFeePayment(payload);
      showToast('Payment recorded. Fee slip ready.', 'success');

      document.getElementById('slipNo').textContent = selectedStudent.studentNo;
      document.getElementById('slipName').textContent = selectedStudent.name;
      document.getElementById('slipClass').textContent = `${selectedStudent.className || ''} ${selectedStudent.section || ''}`;
      document.getElementById('slipType').textContent = payload.type;
      document.getElementById('slipPeriod').textContent = payload.period;
      document.getElementById('slipAmount').textContent = formatCurrency(payload.amount);
      document.getElementById('slipConcession').textContent = formatCurrency(payload.concession);
      document.getElementById('slipDate').textContent = new Date().toLocaleDateString();

      payCard.style.display = 'none';
      slip.style.display = 'block';
      slip.scrollIntoView({ behavior: 'smooth' });
    } catch(err){
      console.error(err);
      showToast('Could not save payment. ' + err.message, 'error');
    } finally {
      payBtn.disabled = false; payBtn.textContent = 'Update Database & Generate Slip';
    }
  });

  document.getElementById('newPaymentBtn').addEventListener('click', () => {
    slip.style.display = 'none';
    payCard.style.display = 'block';
  });

  document.getElementById('searchBtn').addEventListener('click', runSearch);
  document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); });
  runSearch();
</script>
</body>
</html>
